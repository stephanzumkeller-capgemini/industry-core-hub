database:
  connection_string: "postgresql://user:password@localhost:5432/ichub"
  echo: false

cors:
  enabled: true
  allow_origins:
    - "http://localhost:5173"     # Vite dev server
    - "http://localhost:3000"     # React dev server
    - "http://localhost:8080"     # Alternative frontend port
    - "http://127.0.0.1:5173"     # Alternative localhost notation
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:8080"
    - "http://localhost:4173"
  allow_credentials: true
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allow_headers:
    - "*"

consumer:
  discovery:
    discovery_finder:
      url: "https://<discovery-finder-url>/api/v1.0/administration/connectors/discovery/search"
    connector_discovery:
      key: "bpn"
    oauth:
      url: "https://<central-idp-url>/auth/"
      realm: "<realm>"
      client_id: "<client-id>"
      client_secret: "<client-secret>"
    digitalTwinRegistry:
      dct_type_key: "dct:type"
      dct_type_filter:
        operandLeft: "'http://purl.org/dc/terms/type'.'@id'"
        operator: "="
        operandRight: "https://w3id.org/catenax/taxonomy#DigitalTwinRegistry"
  connector:
    dataspace:
      version: "saturn"
    controlplane:
      hostname: "https://<edc-consumer-control-hostname>"
      apiKeyHeader: "X-Api-Key"
      apiKey: "<consumer-edc-api-key>"
      managementPath: "/management"
      protocolPath: "/api/v1/dsp"
      catalogPath: "/catalog"
# -- Provider configuration
provider:
  connector:
    dataspace:
      version: "saturn"
    controlplane:
      hostname: "https://<edc-provider-control-hostname>"
      apiKeyHeader: "X-Api-Key"
      apiKey: "<provider-edc-api-key>"
      managementPath: "/management"
      protocolPath: "/api/v1/dsp"
    dataplane:
      hostname: "https://<edc-provider-dataplane-hostname>"
      publicPath: "/api/public"
  digitalTwinRegistry:
    hostname: "https://<dtr-hostname>"
    apiPath: "/api/v3"
    uri: ""
    asset_config:
      dct_type: "https://w3id.org/catenax/taxonomy#DigitalTwinRegistry"
      # existing_asset_id: <registry-asset> # -- In case an existing DTR asset wants to be used specify here the id, otherwise it will be created based on the url, if it not exists it will be created
    lookup:
      uri: ""
    policy:
      usage:
        context:
          - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
          - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
          - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
        permissions:
          - action: "use"
            constraint:
              and:
                - leftOperand: "https://w3id.org/catenax/2025/9/policy/FrameworkAgreement"
                  operator: "eq"
                  rightOperand: "DataExchangeGovernance:1.0"
                - leftOperand: "https://w3id.org/catenax/2025/9/policy/Membership"
                  operator: "eq"
                  rightOperand: "active"
                - leftOperand: "https://w3id.org/catenax/2025/9/policy/UsagePurpose"
                  operator: "isAnyOf"
                  rightOperand: "cx.core.digitalTwinRegistry:1"
        prohibitions: []
        obligations: []
      access:
        context:
          - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
          - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
          - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
        permissions:
          - action: "access"
            constraint:
              leftOperand: "https://w3id.org/catenax/2025/9/policy/Membership"
              operator: "eq"
              rightOperand: "active"
        prohibitions: []
        obligations: []
  digitalTwinEventAPI:
    hostname: "http://<provider-digital-twin-event-api>"
    apiPath: /api/v3
    uri: ""
    asset_config:
      dct_type: "https://w3id.org/catenax/taxonomy#DigitalTwinEventAPI"
      # existing_asset_id: <event-asset> # -- In case an existing DT Event asset wants to be used specify here the id, otherwise it will be created based on the url, if it not exists it will be created
    lookup:
      uri: ""
    policy:
      usage:
        context:
          - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
          - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
          - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
        permissions:
