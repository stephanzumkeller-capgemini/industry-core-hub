  healthChecks:
    startup:
      enabled: true
      path: "/"
    liveness:
      enabled: true
      path: "/"
    readiness:
      enabled: true
      path: "/"

  # -- ingress declaration to expose the industry-core-hub-backend service
  ingress:
    enabled: false
    className: "nginx"
    ## Optional annotations when using the nginx ingress class
    # annotations:
    #   nginx.ingress.kubernetes.io/rewrite-target: "/$1"
    #   nginx.ingress.kubernetes.io/use-regex: "true"
    #   nginx.ingress.kubernetes.io/enable-cors: "true"
    #   # -- Provide CORS allowed origin.
    #   nginx.ingress.kubernetes.io/cors-allow-origin: "https://*.example.org"
    # -- Ingress TLS configuration
    tls: []
      # # -- Provide tls secret.
      # - secretName: ""
      #   # -- Provide host for tls secret.
      #   hosts:
      #     - ""
    hosts:
      - host: "<frontend-hostname>"
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service: "frontend"
              port: 8080

  # -- The [pod security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod) defines privilege and access control settings for a Pod within the deployment
  podSecurityContext:
    seccompProfile:
      # -- Restrict a Container's Syscalls with seccomp
      type: RuntimeDefault
    # -- Runs all processes within a pod with a special uid
    runAsUser: 1000
    # -- Processes within a pod will belong to this guid
    runAsGroup: 3000
    # -- The owner for volumes and any files created within volumes will belong to this guid
    fsGroup: 3000

   # The [container security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container) defines privilege and access control settings for a Container within a pod
  securityContext:
    capabilities:
      # -- Specifies which capabilities to drop to reduce syscall attack surface
      drop:
        - ALL
      # -- Specifies which capabilities to add to issue specialized syscalls
      add: []
    # -- Whether the root filesystem is mounted in read-only mode
    readOnlyRootFilesystem: true
    # -- Controls [Privilege Escalation](https://kubernetes.io/docs/concepts/security/pod-security-policy/#privilege-escalation) enabling setuid binaries changing the effective user ID
    allowPrivilegeEscalation: false
    # -- Requires the container to run without root privileges
    runAsNonRoot: true
    # -- The container's process will run with the specified uid
    runAsUser: 10000
    # -- The owner for volumes and any files created within volumes will belong to this guid
    runAsGroup: 10001

  # -- specifies volume mounts for the frontend deployment
  volumeMounts:
    - name: tmp
      mountPath: /tmp

  # -- additional volume claims for the containers
  additionalVolumes: []

  # @url: https://cloud.google.com/blog/products/containers-kubernetes/kubernetes-best-practices-resource-requests-and-limits
  # -- Review the default resource limits as this should a conscious choice.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: "128Mi"
    limits:
      cpu: 500m
      memory: 256Mi
      ephemeral-storage: "1Gi"

# -- PostgreSQL chart configuration (cloudpirates)
postgresql:
  # -- Switch to enable or disable the PostgreSQL helm chart
  enabled: true
  # -- String to partially override postgres.fullname
  nameOverride: ""
  # -- String to fully override postgres.fullname
  fullnameOverride: ""
  # -- PostgreSQL image configuration
  image:
    # -- PostgreSQL image registry
    registry: docker.io
    # -- PostgreSQL image repository
    repository: postgres
  # -- PostgreSQL Authentication (postgres admin user)
  auth:
    # -- Password for postgres admin user (stored in existingSecret with key 'postgres-password')
    password: ""
    # -- Default database to create
    database: "ichub-postgres"
    # -- Existing secret containing passwords
    existingSecret: "ichub-postgres-secret"
    # -- Username for  ichub user
    ichubUser: "ichub"
    # -- Password for the non-root username 'ichub'. Secret-key 'ichub-password'.
    ichubPassword: ""
    # -- Determines whether or with what priority a secure SSL TCP/IP connection will be negotiated with the server. There are [six modes](https://www.postgresql.org/docs/current/libpq-connect.html#LIBPQ-CONNECT-SSLMODE)
    sslMode: "prefer"
  # -- Extra environment variables for init scripts
  extraEnvVars:
    - name: "DATABASE_PASSWORD"
      valueFrom:
        secretKeyRef:
          name: "ichub-postgres-secret"
          key: "ichub-password"
  # -- Initdb configuration - runs scripts to create ichub and ichub_keycloak users
  initdb:
    # -- ConfigMap with scripts to be run at first boot
    scriptsConfigMap: "{{ .Release.Name }}-cm-postgres"
  # -- Persistence configuration
  persistence:
    # -- Enable persistence using Persistent Volume Claims
    enabled: false
    # -- Storage class for the volume claim
    size: 10Gi
    # -- Persistent Volume storage class
    torageClass: ""

# -- pgAdmin4 configuration
pgadmin4:
  enabled: false
  env:
    email: pgadmin4@txtest.org
    password: tractusxpgadmin4
  persistentVolume:
    enabled: false
  ingress:
    enabled: false


# -- External database configuration (used when postgresql.enabled is false)
externalDatabase:
  # -- External PostgreSQL host
  host: ""
  # -- External PostgreSQL port
  port: 5432
  # -- External PostgreSQL database name
  database: "postgres"
  # -- External PostgreSQL username for ichub user
  ichubUser: "ichub"
  # -- External PostgreSQL password for ichub user
  ichubPassword: ""
  # -- Existing secret containing database password
  existingSecret: ""
  # -- Key in the existing secret that contains database password for ichub user
  existingIchubSecretKey: "ichub-password"
  # -- Determines whether or with what priority a secure SSL TCP/IP connection will be negotiated with the server. There are [six modes](https://www.postgresql.org/docs/current/libpq-connect.html#LIBPQ-CONNECT-SSLMODE)
  sslMode: "prefer"

# [node selector](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector) to constrain pods to nodes
nodeSelector: {}

# [tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) to configure preferred nodes
tolerations: []

# [affinity](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity) to configure which nodes the pods can be scheduled on
affinity: {}

updateStrategy:
# -- Update strategy type,
# rolling update configuration parameters,
# [reference](https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies).
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# -- Following Catena-X Helm Best Practices
# [reference](https://github.com/eclipse-tractusx/portal/blob/main/charts/portal/values.yaml#L1103).
startupProbe:
  failureThreshold: 30
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 1
livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 10
readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 1

## Keycloak taken from Portal-IAM: https://github.com/eclipse-tractusx/portal-iam
## Migrated from Bitnami to CloudPirates chart

keycloak:
  # -- Switch to enable or disable the Keycloak helm chart
  enabled: true
  # -- Keycloak image configuration
  image:
    # -- Keycloak image tag (immutable tags are recommended)
    tag: "26.5.2@sha256:fb31a59deb46f746f2aaa25adc5da39ceccac4fd22d36a519562b0bf02e8df20"
  # -- Number of Keycloak replicas to deploy
  replicaCount: 1
  # -- Keycloak configuration
  keycloak:
    # -- Keycloak admin username
    adminUser: admin
    # -- Keycloak administrator password.
    adminPassword: "keycloak-admin-password"
    # -- Secret containing the password for admin username 'admin'.
    existingSecret: ""
    # -- The proxy headers that should be accepted by the server (forwarded, xforwarded)
    # Use 'xforwarded' when running behind a reverse proxy that terminates SSL/TLS
    proxyHeaders: "xforwarded"
    # -- Run Keycloak in production mode. TLS configuration is required except when using proxy=edge.
    production: false
    # -- Setting the path relative to '/' for serving resources:
    # as we're migrating from 16.1.1 version which was using the trailing 'auth', we're setting it to '/auth'.
    # IMPORTANT: Do NOT use trailing slash (/auth/) - it causes double-slash in readiness probe path
    # ref: https://www.keycloak.org/migration/migrating-to-quarkus#_default_context_path_changed
    httpRelativePath: /auth

  # -- Realm import configuration (ICHub custom job-based import)
  realmImport:
    enabled: true
    # -- Method: "startup" for --import-realm flag or "job" for post-install job
    # -- "job": Post-install Kubernetes job (allows dynamic password setting)
    method: "job"
    # -- keycloak-config-cli image configuration
    image:
      repository: "adorsys/keycloak-config-cli"
      tag: "latest-26"
      pullPolicy: "IfNotPresent"
    # -- Resource limits for the realm import job
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: "64Mi"
      limits:
        cpu: 500m
        memory: 256Mi
        ephemeral-storage: "128Mi"
  # -- ICHub Realm user configuration (passwords will be hashed at deployment time)
  # -- This is used by the custom realm import job, not native CloudPirates realm import
  ichubRealm:
    name: "ICHub"
    users:
      - username: "ichub-admin"
        password: "changeme"
        email: "ichub-admin@example.com"
        firstName: "Industry"
        lastName: "Admin"
        emailVerified: true
        enabled: true
        attributes:
          BPN: ["BPNL000000000000"]
        realmRoles:
          - "default-roles-ichub"
          - "offline_access"
          - "uma_authorization"
    # -- Client redirect URIs configuration
    clients:
      frontend:
        redirectUris:
          - "http://localhost:3000/*"
          - "http://localhost:5173/*"
          - "http://ichub-frontend.tx.test/*"
          - "http://industry-core-hub-frontend.tx.test/*"
        webOrigins:
          - "http://localhost:3000"
          - "http://localhost:5173"
          - "http://ichub-frontend.tx.test"
          - "http://industry-core-hub-frontend.tx.test"
      backend:
        redirectUris:
          - "http://localhost:8000/*"
          - "http://localhost:9000/*"
          - "http://ichub-backend.tx.test/*"
        webOrigins:
          - "http://localhost:8000"
          - "http://localhost:9000"
          - "http://ichub-backend.tx.test"
  # -- Environment variables and command configuration
  # -- Will be set automatically based on realmImport.method
  extraEnvVars: []

  # -- Extra volumes for Keycloak pod (themes)
  extraVolumes:
    - name: themes
      emptyDir: {}

  # -- Extra volume mounts for Keycloak container
  extraVolumeMounts:
    - name: themes
      mountPath: /opt/keycloak/themes/catenax-central

  # -- Extra init containers for Keycloak pod (CloudPirates format)
  extraInitContainers:
    - name: import-themes
      image: docker.io/tractusx/portal-iam:v4.2.0
      imagePullPolicy: IfNotPresent
      command:
        - sh
      args:
        - -c
        - |
          echo "Copying themes..."
          cp -R /import/themes/catenax-central/* /themes
      volumeMounts:
        - name: themes
          mountPath: /themes

  # -- Service configuration
  service:
    # -- Keycloak HTTP service port
    httpPort: 80

  # -- Ingress configuration
  ingress:
    # -- Enable ingress record generation
    enabled: false
    # -- Ingress hosts configuration
    hosts:
      - host: "<keycloak-hostname>"
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for Keycloak ingress
    tls: []

  # -- Resource configuration for Keycloak
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"

  # -- Database Configuration (CloudPirates format)
  # Keycloak connects to the main industry-core-hub PostgreSQL using a dedicated secret
  # The secret is auto-generated by templates/secret-keycloak-db.yaml with keys 'db-username' and 'db-password'
  # The database host uses a fixed alias service (ichub-postgresql-alias) that resolves to the actual PostgreSQL service
  database:
    # -- Database type
    type: postgres
    # -- Database name (uses the main ichub-postgres database)
    name: ichub-postgres
    # -- Database host (uses fixed alias service created by templates/service-postgresql-alias.yaml)
    # -- This alias automatically resolves to <release-name>-postgresql, no manual configuration needed
    host: "ichub-postgresql-alias"
    # -- Secret containing db-username and db-password keys (auto-created by templates/secret-keycloak-db.yaml)
    existingSecret: "ichub-keycloak-db"

  # -- Embedded PostgreSQL Configuration (CloudPirates subchart)
  # Disabled - uses main industry-core-hub PostgreSQL instead
  postgres:
    enabled: false
