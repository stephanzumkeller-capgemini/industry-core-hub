# Default values for industry-core-hub.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""
replicaCount: 1

# -- Deployment mode: "helm" for standard Helm deployments, "argocd" for ArgoCD deployments
# This controls which annotations are used for the realm import job
deploymentMode: "helm"

participantId: ""

# -- Backend configuration
backend:
  apiVersion: v1
  enabled: true
  name: "industry-core-hub-backend"
  image:
    repository: "tractusx/industry-core-hub-backend"
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion
    tag: ""
    # -- Existing image pull secret to use to [obtain the container image from private registries](https://kubernetes.io/docs/concepts/containers/images/#using-a-private-registry)
    pullSecrets: []

  service:
    # -- [Service type](https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types) to expose the running application on a set of Pods as a network service
    type: ClusterIP
    portService: 8000
    portContainer: 8000
  cors:
    enabled: true
    allow_origins:
      - "https://<frontend-hostname>"  # Production frontend URL
    allow_credentials: true
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
      - "PATCH"
    allow_headers:
      - "*"
  # -- Backend configuration, changes to these values will be reflected in the configuration.yml file.
  configuration:
    # -- Business Partner Number (BPN) of the operator running this instance.
    # Used by PCF Exchange and other managers to identify the local participant.
    # Defaults to the top-level participantId value if left empty.
    bpn: ""
    # -- Agreements define the ODRL policies for each semantic model.
    # The format follows the Tractus-X SDK TCK reference (plain keys).
    # Both Jupiter and Saturn use identical rule structures — only the context differs.
    # The JSON-LD @context handles namespace expansion (ODRL prefixes, cx-policy terms).
    agreements:
      - semanticid: urn:samm:io.catenax.generic.digital_product_passport:6.1.0#DigitalProductPassport
        usage:
          context:
            - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
            - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
            - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
          permission:
            - action: "use"
              constraint:
                and:
                  - leftOperand: "FrameworkAgreement"
                    operator: "eq"
                    rightOperand: "DataExchangeGovernance:1.0"
                  - leftOperand: "Membership"
                    operator: "eq"
                    rightOperand: "active"
                  - leftOperand: "UsagePurpose"
                    operator: "isAnyOf"
                    rightOperand: "cx.circular.dpp:1"
          prohibition: []
          obligation: []
        access:
          context:
            - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
            - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
            - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
          permission:
            - action: access
              constraint:
                leftOperand: "Membership"
                operator: "eq"
                rightOperand: "active"
          prohibition: []
          obligation: []
