---
## For being used in the Integration ArgoCD test environment from the Catena-X Association

deploymentMode: "argocd"

nameOverride: "manufacturer-ichub"
fullnameOverride: "manufacturer-ichub"

participantId : "<path:industry-core-hub/data/edc#bpn>"

postgresql:
  auth:
    ## Root password override
    password: <path:industry-core-hub/data/db#rootPass>
    ## Industry Core User Password
    ichubPassword: <path:industry-core-hub/data/db#ichubPass>
    existingSecret: "ichub-manufacturer-db-secret"
      # -- Switch to enable or disable the PostgreSQL helm chart
  enabled: true
  fullnameOverride: "ichub-manufacturer-db"
  nameOverride: "ichub-manufacturer-db"

# -- pgAdmin4 configuration
frontend:
  name: "manufacturer-ichub-frontend"
  nameOverride: "manufacturer-ichub-frontend"
  fullnameOverride: "manufacturer-ichub-frontend"
  config:
    # Core application
    environment: "integration"
    version: "1.0.0"
    
    # API configuration
    ichubBackendUrl: "https://backend-ichub-manufacturer.int.catena-x.net/v1"
    apiTimeout: 20000
    apiRetryAttempts: 2
    requireHttpsUrlPattern: true
    
    # API key configuration (disabled for integration)
    apiKey: ""
    apiKeyHeader: "X-API-Key"
    enableApiKeyRotation: false
    apiKeyExpiryWarningDays: 7
    
    # Authentication configuration (disabled for integration)
    authEnabled: true
    authProvider: keycloak
    authSessionTimeout: 3600000  # 1 hour in milliseconds
    authRenewTokenMinValidity: 70  # Renew token when 70 seconds validity remains
    authLogoutRedirectUri: "https://frontend-ichub-manufacturer.int.catena-x.net"
    
    # Keycloak configuration
    keycloak:
      url: "https://ichub-iam-manufacturer.int.catena-x.net/auth"
      realm: "ICHub"
      clientId: "industry-core-hub-frontend"
  
    
    # Feature flags for integration environment
    enableAdvancedLogging: true
    enablePerformanceMonitoring: true
    enableDevTools: false
    
    # Notifications configuration
    notifications:
      pollInterval: 30000

    # UI configuration
    uiTheme: "auto"
    uiLocale: "en"
    uiCompactMode: false
    
    # Governance configuration
    governanceApiUrl: ""
    governanceTimeout: 30000
    governanceRetryAttempts: 2
    
    # Participant configuration  
    participantApiUrl: ""
    participantTimeout: 30000
    participantRetryAttempts: 2
  
  env:
    # Legacy backend URL (maintained for backward compatibility)
    backendUrl: "https://backend-ichub-manufacturer.int.catena-x.net/v1"
  ingress:
      enabled: true
      className: "nginx"
      ## Optional annotations when using the nginx ingress class
      annotations:
       cert-manager.io/cluster-issuer: letsencrypt-prod
       nginx.ingress.kubernetes.io/rewrite-target: "/$1"
       nginx.ingress.kubernetes.io/use-regex: "true"
       nginx.ingress.kubernetes.io/enable-cors: "true"
      #   # -- Provide CORS allowed origin.
      #   nginx.ingress.kubernetes.io/cors-allow-origin: "https://*.example.org"
      # -- Ingress TLS configuration
      tls:
       - secretName: "frontend-ichub-manufacturer.int.catena-x.net-tls"
         hosts:
           - "frontend-ichub-manufacturer.int.catena-x.net"
        # # -- Provide tls secret.
        # - secretName: ""
        #   # -- Provide host for tls secret.
        #   hosts:
        #     - ""
      hosts:
        - host: "frontend-ichub-manufacturer.int.catena-x.net"
          paths:
            - path: /(.*)
              pathType: ImplementationSpecific
              backend:
                service: "frontend-manufacturer"
                port: 8080

backend:
  apiVersion: v1
  name: "manufacturer-ichub-backend"
  nameOverride: "manufacturer-ichub-backend"
  fullnameOverride: "manufacturer-ichub-backend"
  cors:
    enabled: true
    allow_origins:
      - "https://frontend-ichub-manufacturer.int.catena-x.net"
      - "https://backend-ichub-manufacturer.int.catena-x.net"
    allow_credentials: true
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
      - "PATCH"
    allow_headers:
      - "*"
  # -- Persistance configuration for the backend
  persistence:
    # -- Create a PVC to persist storage (if disabled, data and logs will not be persisted)
    enabled: true
    data:
      # -- Enable data persistence
      enabled: true
      # -- Storage size for data
      size: 1Gi
      # -- Access mode for data volume
      accessMode: ReadWriteOnce
      # -- Storage class for data volume
      storageClass: "default"
    logs:
      # -- Enable logs persistence
      enabled: true
      # -- Storage size for logs
      size: 1Gi
      # -- Access mode for logs volume
      accessMode: ReadWriteOnce
      # -- Storage class for logs volume
      storageClass: "default"
  configuration:
    authorization:
      enabled: true
      apiKey:
        key: "X-Api-Key"
        value: <path:industry-core-hub/data/backend#apiKey>
      keycloak:
        enabled: true
        authUrl: "https://ichub-iam-manufacturer.int.catena-x.net/auth/"
        realm: "ICHub"
        clientId: "industry-core-hub-api"
        clientSecret: "ichub-client-secret-2024"
        retry:
          maxRetries: 10
          retryDelay: 15
          backgroundRetryInterval: 60
    # -- Agreements define the ODRL policies for each semantic model (Saturn format).
      agreements:
      - semanticid: urn:samm:io.catenax.generic.digital_product_passport:6.1.0#DigitalProductPassport
        usage:
          context:
            - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
            - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
            - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
          permission:
            - action: "use"
              constraint:
                and:
                  - leftOperand: "FrameworkAgreement"
                    operator: "eq"
                    rightOperand: "DataExchangeGovernance:1.0"
                  - leftOperand: "Membership"
                    operator: "eq"
                    rightOperand: "active"
                  - leftOperand: "UsagePurpose"
                    operator: "isAnyOf"
                    rightOperand: "cx.circular.dpp:1"
          prohibition: []
          obligation: []
        access:
          context:
            - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
            - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
            - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
          permission:
            - action: access
