              - action: "access"
                constraint:
                  leftOperand: "https://w3id.org/catenax/2025/9/policy/Membership"
                  operator: "eq"
                  rightOperand: "active"
            prohibition: []
            obligation: []
      pcfExchange:
        # -- Enable or disable PCF Exchange
        enabled: false
        # -- Hostname of the PCF Exchange API
        hostname: "https://<provider-pcf-exchange-api>"
        # -- When true, both PCF versions (v7.0.0 and v9.0.0) must be uploaded
        # -- for a manufacturer part before it can be published or exchanged.
        requireBothVersions:
          synchronous: false
          asynchronous: false
        asset_config:
          dct_type: "cx-taxo:PCFExchange"
          # existing_asset_id: <pcf-exchange-asset> # -- In case an existing PCF Exchange asset (v1.2.0) wants to be used specify here the id, otherwise it will be created based on the url, if it not exists it will be created
          # existing_legacy_asset_id: <pcf-exchange-legacy-asset> # -- In case an existing PCF Exchange asset (v1.1.1 /productIds) wants to be used specify here the id
        policy:
          usage:
            context:
              - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
              - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
              - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
            permission:
              - action: "use"
                constraint:
                  and:
                    - leftOperand: "https://w3id.org/catenax/2025/9/policy/FrameworkAgreement"
                      operator: "eq"
                      rightOperand: "DataExchangeGovernance:1.0"
                    - leftOperand: "https://w3id.org/catenax/2025/9/policy/Membership"
                      operator: "eq"
                      rightOperand: "active"
                    - leftOperand: "https://w3id.org/catenax/2025/9/policy/UsagePurpose"
                      operator: "isAnyOf"
                      rightOperand: "cx.pcf.base:1"
            prohibition: []
            obligation: []
          access:
            context:
              - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
              - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
              - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
            permission:
              - action: "access"
                constraint:
                  leftOperand: "https://w3id.org/catenax/2025/9/policy/Membership"
                  operator: "eq"
                  rightOperand: "active"
            prohibition: []
            obligation: []
    submodel_dispatcher:
      path: "/industry-core-hub/data/submodels"
      apiPath: "/submodel-dispatcher"
  ingress:
      enabled: true
      className: "nginx"
      ## Optional annotations when using the nginx ingress class
      annotations:
       cert-manager.io/cluster-issuer: letsencrypt-prod
      #   nginx.ingress.kubernetes.io/rewrite-target: "/$1"
      #   nginx.ingress.kubernetes.io/use-regex: "true"
       nginx.ingress.kubernetes.io/enable-cors: "true"
      #   # -- Provide CORS allowed origin.
       nginx.ingress.kubernetes.io/cors-allow-origin: "https://frontend-ichub-manufacturer.int.catena-x.net, *"
       nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
      # -- Ingress TLS configuration
      tls:
       - secretName: "backend-ichub-manufacturer.int.catena-x.net-tls"
         hosts:
           - "backend-ichub-manufacturer.int.catena-x.net" 
        # # -- Provide tls secret.
        # - secretName: ""
        #   # -- Provide host for tls secret.
        #   hosts:
        #     - ""
      hosts:
      - host: "backend-ichub-manufacturer.int.catena-x.net"
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service: "backend-manufacturer"
              port: 8000

keycloak:
  realmImport:
    enabled: true
    method: "job"
  realm:
    users:
      - username: "ichub-admin"
        password: "changeme"
        email: "ichub-admin@example.com"
        firstName: "Industry"
        lastName: "Admin"
        emailVerified: true
        enabled: true
        attributes:
          BPN: ["BPNL000000000000"]
        realmRoles:
          - "default-roles-ichub"
          - "offline_access"
          - "uma_authorization"
    clients:
      frontend:
        redirectUris:
          - "http://localhost:3000/*"
          - "http://localhost:5173/*"
          - "https://frontend-ichub-manufacturer.int.catena-x.net/*"
        webOrigins:
          - "http://localhost:3000"
          - "http://localhost:5173"
          - "https://frontend-ichub-manufacturer.int.catena-x.net"
      backend:
        redirectUris:
          - "http://localhost:8000/*"
          - "http://localhost:9000/*"
          - "https://backend-ichub-manufacturer.int.catena-x.net/*"
        webOrigins:
          - "http://localhost:8000"
          - "http://localhost:9000"
          - "https://backend-ichub-manufacturer.int.catena-x.net"
  
  externalDatabase:
