    user: "ichub_keycloak"
    database: "ichub-postgres"
    password: <path:industry-core-hub/data/db#ichubPass>
    existingSecret: ""
    existingSecretPasswordKey: ""
  ingress:
    # -- Enable ingress record generation
    enabled: true
    # -- Provide default path for the ingress record.
    hostname: "ichub-iam-manufacturer.int.catena-x.net"
    # -- Enable TLS/SSL for ingress (boolean)
    tls: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod 